// ============== SCORES ==============
function renderScores(p) {
  const s = p.sofa||{}, q = p.qsofa||{}, g = p.gcs||{eye:4,verbal:5,motor:6};
  const sofaTotal = ['resp','coag','liver','cardio','cns','renal'].reduce((a,k)=>a+parseInt(s[k]||0),0);
  const qsofaTotal = ['rr','altered','sbp'].reduce((a,k)=>a+(q[k]?1:0),0);
  const gcsTotal = parseInt(g.eye)+parseInt(g.verbal)+parseInt(g.motor);
  return `
    <div class="grid-2">
      <div class="section">
        <div class="section-title">SOFA Score</div>
        ${[
          ['resp','Respiration (PaO₂/FiO₂)',['≥400 (0)','<400 (1)','<300 (2)','<200 vent (3)','<100 vent (4)']],
          ['coag','Platelets ×10³',['≥150 (0)','<150 (1)','<100 (2)','<50 (3)','<20 (4)']],
          ['liver','Bilirubin mg/dL',['<1.2 (0)','1.2-1.9 (1)','2.0-5.9 (2)','6.0-11.9 (3)','>12 (4)']],
          ['cardio','Cardiovascular',['MAP≥70 (0)','MAP<70 (1)','Dop≤5/Dob (2)','Dop>5 or NE≤0.1 (3)','Dop>15 or NE>0.1 (4)']],
          ['cns','CNS (GCS)',['15 (0)','13-14 (1)','10-12 (2)','6-9 (3)','<6 (4)']],
          ['renal','Renal',['<1.2 (0)','1.2-1.9 (1)','2.0-3.4 (2)','3.5-4.9 (3)','>5 (4)']]
        ].map(([k,l,opts]) => `
          <div class="form-group"><label>${l}</label>
            <select onchange="updateSOFA('${k}',this.value)">
              ${opts.map((o,i)=>`<option value="${i}" ${parseInt(s[k]||0)===i?'selected':''}>${o}</option>`).join('')}
            </select>
          </div>`).join('')}
        <div class="score-box">
          <div class="score-value">${sofaTotal}</div>
          <div class="score-label">SOFA Total</div>
          <div class="score-interp">Mortality: ${sofaTotal<6?'<10%':sofaTotal<10?'15-20%':sofaTotal<13?'40-50%':'>60%'}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">qSOFA</div>
        ${[['rr','RR ≥ 22'],['altered','Altered mentation (GCS<15)'],['sbp','SBP ≤ 100']].map(([k,l]) => `
          <label style="display:flex;align-items:center;gap:8px;padding:8px;background:#f7fafc;border-radius:4px;margin-bottom:6px;cursor:pointer;font-size:13px;">
            <input type="checkbox" ${q[k]?'checked':''} onchange="updateQSOFA('${k}',this.checked)">${l}
          </label>`).join('')}
        <div class="score-box">
          <div class="score-value">${qsofaTotal}/3</div>
          <div class="score-label">qSOFA</div>
          <div class="score-interp">${qsofaTotal>=2?'⚠ Sepsis risk':'Lower risk'}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">GCS</div>
        <div class="form-group"><label>Eye</label><select onchange="updateGCS('eye',this.value)">${[['4','Spontaneous'],['3','To voice'],['2','To pain'],['1','None']].map(([v,t])=>`<option value="${v}" ${g.eye==v?'selected':''}>${v} - ${t}</option>`).join('')}</select></div>
        <div class="form-group"><label>Verbal</label><select onchange="updateGCS('verbal',this.value)">${[['5','Oriented'],['4','Confused'],['3','Inappropriate'],['2','Incomprehensible'],['1','None']].map(([v,t])=>`<option value="${v}" ${g.verbal==v?'selected':''}>${v} - ${t}</option>`).join('')}</select></div>
        <div class="form-group"><label>Motor</label><select onchange="updateGCS('motor',this.value)">${[['6','Obeys'],['5','Localizes'],['4','Withdraws'],['3','Abnormal flexion'],['2','Extension'],['1','None']].map(([v,t])=>`<option value="${v}" ${g.motor==v?'selected':''}>${v} - ${t}</option>`).join('')}</select></div>
        <div class="score-box">
          <div class="score-value">${gcsTotal}/15 (E${g.eye}V${g.verbal}M${g.motor})</div>
          <div class="score-interp">${gcsTotal<=8?'⚠ Severe – intubate':gcsTotal<=12?'Moderate':'Mild/Normal'}</div>
        </div>
      </div>
    </div>
  `;
}

async function updateSOFA(k,v) { const p=getCurrentPatient(); p.sofa={...(p.sofa||{}),[k]:v}; await updatePatientField('sofa',p.sofa); setTab('scores'); }
async function updateQSOFA(k,v) { const p=getCurrentPatient(); p.qsofa={...(p.qsofa||{}),[k]:v}; await updatePatientField('qsofa',p.qsofa); setTab('scores'); }
async function updateGCS(k,v) { const p=getCurrentPatient(); p.gcs={...(p.gcs||{eye:4,verbal:5,motor:6}),[k]:parseInt(v)}; await updatePatientField('gcs',p.gcs); setTab('scores'); }

    <div class="section">

      <div class="form-group" style="margin-bottom:12px;">

          ${weight ? `<div style="font-size:11px;color:#38a169;margin-top:3px;">✓ From Info tab: ${weight} kg</div>` : `<div style="font-size:11px;color:#e53e3e;margin-top:3px;">⚠ Enter weight</div>`}

        <div class="form-group">
          <label style="font-weight:600;color:#2d3748;">Dose <span id="inf-unit-label" style="color:#718096;font-weight:400;">(${firstDrug.unit})</span></label>

      <div style="background:#f7fafc;border-radius:8px;padding:12px;margin-bottom:12px;">
        <div style="font-weight:600;color:#2d3748;margin-bottom:8px;font-size:13px;">🧪 Solution Concentration</div>
        <div class="grid-2" style="gap:10px;">
          <div>
            <label id="inf-conc-drug-label" style="font-size:12px;color:#718096;">Drug amount (${firstDrug.unitType})</label>
            <input type="number" id="inf-conc-drug" value="${dc.mg}" step="0.1" min="0.01"
              oninput="infCalcFromDose()" style="width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;">
          </div>
          <div>
            <label style="font-size:12px;color:#718096;">Volume (mL)</label>

// ---- Infusion Logic ----
function infGetDrug() {
  const name = document.getElementById('inf-drug')?.value;
  return INFUSION_DRUGS.find(d => d.name === name);
}

function infGetWeight() {
  return parseFloat(document.getElementById('inf-weight')?.value) || 0;
}

function infGetConc() {
  const drugAmt = parseFloat(document.getElementById('inf-conc-drug')?.value) || 0;
  const vol = parseFloat(document.getElementById('inf-conc-vol')?.value) || 1;
  return { drugAmt, vol, concPerMl: (drugAmt * 1000) / vol };
}

function infNeedsWeight(drug) {
  return ['wt_mcg_kg_min','wt_mcg_kg_hr','wt_mg_kg_hr','u_kg_hr'].includes(drug.f);
}

function infCalcRate(drug, dose, weight, concPerMl) {
  switch(drug.f) {
    case 'wt_mcg_kg_min': return (dose * weight * 60) / concPerMl;
    case 'wt_mcg_kg_hr':  return (dose * weight) / concPerMl;
    case 'wt_mg_kg_hr':   return (dose * weight * 1000) / concPerMl;
    case 'u_kg_hr':       return (dose * weight * 1000) / concPerMl;
    case 'u_per_min':     return (dose * 60 * 1000) / concPerMl;
    case 'mg_per_min':    return (dose * 60 * 1000) / concPerMl;
    case 'mcg_per_min':   return (dose * 60) / concPerMl;
    case 'mg_per_hr':     return (dose * 1000) / concPerMl;
    case 'units_per_hr':  return (dose * 1000) / concPerMl;
    default: return 0;
  }
}

function infCalcDose(drug, rate, weight, concPerMl) {
  switch(drug.f) {
    case 'wt_mcg_kg_min': return (rate * concPerMl) / (weight * 60);
    case 'wt_mcg_kg_hr':  return (rate * concPerMl) / weight;
    case 'wt_mg_kg_hr':   return (rate * concPerMl) / (weight * 1000);
    case 'u_kg_hr':       return (rate * concPerMl) / (weight * 1000);
    case 'u_per_min':     return (rate * concPerMl) / (60 * 1000);
    case 'mg_per_min':    return (rate * concPerMl) / (60 * 1000);
    case 'mcg_per_min':   return (rate * concPerMl) / 60;
    case 'mg_per_hr':     return (rate * concPerMl) / 1000;
    case 'units_per_hr':  return (rate * concPerMl) / 1000;
    default: return 0;
  }
}

function infUpdate() {
  const drug = infGetDrug();
  if (!drug) return;
  // Unit label
  const ul = document.getElementById('inf-unit-label');
  if (ul) ul.textContent = `(${drug.unit})`;
  // Dose range
  const rl = document.getElementById('dose-range-label');
  if (rl) rl.textContent = `Dose Range: ${drug.min} - ${drug.max} ${drug.unit}`;
  // Conc label
  const cl = document.getElementById('inf-conc-drug-label');
  if (cl) cl.textContent = `Drug amount (${drug.unitType})`;
  // Default conc
  const cd = document.getElementById('inf-conc-drug');
  const cv = document.getElementById('inf-conc-vol');
  if (cd) cd.value = drug.dc.mg;
  if (cv) cv.value = drug.dc.ml;
  // Presets
  const presetsEl = document.getElementById('inf-presets');
  if (presetsEl) {
    const ps = INF_PRESETS[drug.name] || [];
    presetsEl.innerHTML = ps.map(p =>
      `<button onclick="infApplyPreset(${p.mg},${p.ml})" style="padding:5px 10px;font-size:11px;background:#fff;border:1px solid #bee3f8;border-radius:12px;cursor:pointer;color:#2b6cb0;">${p.mg}${drug.unitType}/${p.ml}mL</button>`
    ).join('');
  }
  infUpdateConcDisplay(drug);
  // Recalc if dose filled
  const doseVal = parseFloat(document.getElementById('inf-dose')?.value);
  if (!isNaN(doseVal) && doseVal > 0) infCalcFromDose();
}

function infApplyPreset(mg, ml) {
  const cd = document.getElementById('inf-conc-drug');
  const cv = document.getElementById('inf-conc-vol');
  if (cd) cd.value = mg;
  if (cv) cv.value = ml;
  infUpdateConcDisplay(infGetDrug());
  infCalcFromDose();
}

function infUpdateConcDisplay(drug) {
  const { drugAmt, vol, concPerMl } = infGetConc();
  const el = document.getElementById('inf-conc-display');
  if (!el || !drug) return;
  const smallUnit = drug.unitType === 'mg' ? 'mcg' : ('m' + drug.unitType);
  el.textContent = (drugAmt/vol).toFixed(3) + ' ' + drug.unitType + '/mL  =  ' + concPerMl.toFixed(1) + ' ' + smallUnit + '/mL';
}

function infCalcFromDose() {
  const drug = infGetDrug();
  if (!drug) return;
  const dose = parseFloat(document.getElementById('inf-dose')?.value);
  const weight = infGetWeight();
  const { concPerMl } = infGetConc();
  infUpdateConcDisplay(drug);
  const ri = document.getElementById('inf-rate-input');
  if (ri) ri.value = '';
  if (!dose || dose <= 0) { infClearResult(); return; }
  if (infNeedsWeight(drug) && (!weight || weight <= 0)) { infShowWarn('⚠ Enter weight first'); return; }
  const rate = infCalcRate(drug, dose, weight, concPerMl);
  infShowResult(rate, dose, drug);
  if (ri) ri.value = rate.toFixed(2);
}

function infCalcFromRate() {
  const drug = infGetDrug();
  if (!drug) return;
  const rate = parseFloat(document.getElementById('inf-rate-input')?.value);
  const weight = infGetWeight();
  const { concPerMl } = infGetConc();
  infUpdateConcDisplay(drug);
  const di = document.getElementById('inf-dose');
  if (di) di.value = '';
  if (!rate || rate <= 0) { infClearResult(); return; }
  if (infNeedsWeight(drug) && (!weight || weight <= 0)) { infShowWarn('⚠ Enter weight first'); return; }
  const dose = infCalcDose(drug, rate, weight, concPerMl);
  infShowResult(rate, dose, drug);
  if (di) di.value = dose.toFixed(4);
}

function infShowResult(rate, dose, drug) {
  const el = document.getElementById('inf-result');
  if (!el) return;
  const within = dose >= drug.min && dose <= drug.max;
  const below  = dose < drug.min;
  let bg, border, color, status;
  if (within)     { bg='#f0fff4'; border='2px solid #68d391'; color='#276749'; status='✅ Within safe range'; }
  else if (below) { bg='#fffbeb'; border='2px solid #f6ad55'; color='#c05621'; status='⚠ Below minimum dose'; }
  else            { bg='#fff5f5'; border='2px solid #fc8181'; color='#c53030'; status='🔴 Above maximum dose!'; }
  el.style.cssText = `border-radius:10px;padding:18px;text-align:center;margin-bottom:14px;background:${bg};border:${border};color:${color};`;
  const noteHtml = drug.note ? '<div style="font-size:11px;margin-top:8px;opacity:0.8;line-height:1.5;text-align:left;">📌 ' + drug.note + '</div>' : '';
  el.innerHTML =
    '<div style="font-size:28px;font-weight:800;">' + parseFloat(rate).toFixed(2) + ' <span style="font-size:16px;font-weight:500;">mL/hr</span></div>' +
    '<div style="font-size:13px;margin-top:4px;opacity:0.8;">Dose: ' + dose.toFixed(4) + ' ' + drug.unit + '</div>' +
    '<div style="font-size:14px;font-weight:700;margin-top:6px;">' + status + '</div>' +
    noteHtml;
  // Range bar
  const pct = Math.min(100, Math.max(0, ((dose - drug.min) / (drug.max - drug.min)) * 100));
  const rb = document.getElementById('inf-range-box');
  if (rb) rb.style.display = 'block';
  const rf = document.getElementById('inf-range-fill');
  if (rf) { rf.style.width = pct + '%'; rf.style.background = within ? '#68d391' : (below ? '#f6ad55' : '#fc8181'); }
  const rl = document.getElementById('inf-range-labels');
  if (rl) rl.innerHTML = '<span>' + drug.min + '</span><span>' + drug.unit + '</span><span>' + drug.max + '</span>';
  // Save button
  const saveBtn = document.getElementById('inf-save-btn');
  if (saveBtn) { saveBtn.style.display = 'block'; saveBtn._infData = { drug: drug.name, rate: parseFloat(rate).toFixed(2), dose: dose.toFixed(4), unit: drug.unit }; }
}

function infShowWarn(msg) {
  const el = document.getElementById('inf-result');
  if (!el) return;
  el.style.cssText = 'border-radius:10px;padding:18px;text-align:center;margin-bottom:14px;background:#fffbeb;border:2px solid #f6ad55;color:#c05621;font-size:15px;';
  el.textContent = msg;
  const rb = document.getElementById('inf-range-box');
  if (rb) rb.style.display = 'none';
}

function infClearResult() {
  const el = document.getElementById('inf-result');
  if (!el) return;
  el.style.cssText = 'border-radius:10px;padding:18px;text-align:center;margin-bottom:14px;border:2px solid #e2e8f0;background:#f7fafc;color:#a0aec0;font-size:15px;';
  el.textContent = 'Enter dose or rate';
  const rb = document.getElementById('inf-range-box');
  if (rb) rb.style.display = 'none';
  const saveBtn = document.getElementById('inf-save-btn');
  if (saveBtn) saveBtn.style.display = 'none';
}

function infSaveToTreatment() {
  const saveBtn = document.getElementById('inf-save-btn');
  if (!saveBtn || !saveBtn._infData) return;
  const { drug, rate, dose, unit } = saveBtn._infData;
  showModal(`
    <div class="modal-title">💾 Save as Treatment Order</div>
    <div style="background:#f0fff4;border-radius:8px;padding:12px;margin-bottom:14px;font-size:14px;">
      <strong>${drug}</strong><br>Rate: ${rate} mL/hr | Dose: ${dose} ${unit}
    </div>
    <div class="form-group"><label>Notes</label>
      <textarea id="inf-save-notes" style="min-height:60px;" placeholder="e.g. Titrate to MAP > 65..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="infDoSave('${drug}','${rate}','${dose}','${unit}')">Save</button>
    </div>
  `);
}

async function infDoSave(drugName, rate, dose, unit) {
  const p = getCurrentPatient();
  const notes = document.getElementById('inf-save-notes')?.value || '';
  const { error } = await sb.from('treatments').insert({
    patient_id: p.id,
    name: drugName,
    dose: dose + ' ' + unit + ' = ' + rate + ' mL/hr',
    route: 'IV infusion',
    frequency: 'Continuous',
    indication: 'Infusion Calculator',
    notes: notes,
    by_user: state.profile.full_name
  });
  closeModal();
  if (error) { alert('❌ Error: ' + error.message); return; }
  alert('✅ Saved to Treatment Orders');
  setTab('treatments');
}

// ============== NOTIFICATIONS UI ==============
function toggleNotifs() {
  const d = document.getElementById('notif-drawer');
  d.classList.toggle('active');
  if (d.classList.contains('active')) renderNotifList();
}

function closeNotifs() {
  document.getElementById('notif-drawer').classList.remove('active');
}

function renderNotifList() {
  const list = document.getElementById('notif-list');
  if (state.notifications.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#a0aec0;font-size:13px;">No notifications</div>';
    return;
  }
  list.innerHTML = state.notifications.map(n => {
    const isMention = n.type && n.type.includes('mention');
    return `
    <div class="notif-item ${!n.is_read?'unread':''}" style="${isMention?'border-left:4px solid #d69e2e !important;background:#fffaf0;':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div onclick="openNotif('${n.id}', '${n.patient_id||''}')" style="flex:1;cursor:pointer;">
          <div class="notif-title">${isMention?'⭐ ':''}${escapeHtml(n.title)}</div>
          <div class="notif-body">${escapeHtml(n.body||'')}</div>
          <div class="notif-time">${formatDateTime(n.created_at)}</div>
        </div>
        <button class="btn-danger btn-small" onclick="deleteNotif('${n.id}', event)" style="padding:4px 8px;">✕</button>
      </div>
    </div>
  `;}).join('');
}

async function openNotif(id, pid) {
  await sb.from('notifications').update({ is_read: true }).eq('id', id);
  const n = state.notifications.find(x => x.id === id);
  if (n) n.is_read = true;
  state.unreadCount = state.notifications.filter(x => !x.is_read).length;
  updateBellBadge();
  if (pid) selectPatient(pid);
  closeNotifs();
}

async function deleteNotif(id, ev) {
  if (ev) ev.stopPropagation();
  await sb.from('notifications').delete().eq('id', id);
  state.notifications = state.notifications.filter(n => n.id !== id);
  state.unreadCount = state.notifications.filter(n => !n.is_read).length;
  updateBellBadge();
  renderNotifList();
}

async function deleteAllNotifs() {
  if (!confirm('Delete ALL notifications? This cannot be undone.')) return;
  await sb.from('notifications').delete().eq('user_id', state.profile.id);
  state.notifications = [];
  state.unreadCount = 0;
  updateBellBadge();
  renderNotifList();
}

async function deleteReadNotifs() {
  const readIds = state.notifications.filter(n => n.is_read).map(n => n.id);
  if (readIds.length === 0) { alert('No read notifications to delete.'); return; }
  if (!confirm(`Delete ${readIds.length} read notification(s)?`)) return;
  await sb.from('notifications').delete().in('id', readIds);
  state.notifications = state.notifications.filter(n => !n.is_read);
  renderNotifList();
}

async function markAllRead() {
  await sb.from('notifications').update({ is_read: true }).eq('user_id', state.profile.id).eq('is_read', false);
  state.notifications.forEach(n => n.is_read = true);
  state.unreadCount = 0;
  updateBellBadge();
  renderNotifList();
}

// ============== MENTION SYSTEM ==============
let _mentionCtx = null;

function handleMentionInput(el, ddId) {
  const dd = document.getElementById(ddId);
  if (!dd) return;
  const text = el.value;
  const cursorPos = el.selectionStart;
  const textBefore = text.substring(0, cursorPos);
  
  // Find last @ before cursor that's at word boundary
  const match = textBefore.match(/(?:^|\s)@([^\s@]*)$/);
  
  if (!match) {
    dd.classList.remove('active');
    _mentionCtx = null;
    return;
  }
  
  const query = match[1].toLowerCase();
  const atPos = cursorPos - match[1].length - 1;
  
  // Filter users (exclude self)
  const filtered = state.allUsers
    .filter(u => u.id !== state.profile.id)
    .filter(u => !query || u.full_name.toLowerCase().includes(query))
    .slice(0, 8);
  
  if (filtered.length === 0) {
    dd.classList.remove('active');
    return;
  }
  
  _mentionCtx = { el, ddId, atPos, queryLen: match[1].length };
  
  dd.innerHTML = filtered.map(u => `
    <div class="mention-item" onclick="selectMention('${u.id}', ${JSON.stringify(u.full_name).replace(/"/g, '&quot;')})">
      <span>👨‍⚕️ ${escapeHtml(u.full_name)}</span>
      <span class="role-badge ${u.role}">${u.role}</span>
    </div>
  `).join('');
  
  // Position dropdown
  dd.style.top = (el.offsetHeight + 4) + 'px';
  dd.style.left = '0';
  dd.style.width = el.offsetWidth + 'px';
  dd.classList.add('active');
}

function selectMention(userId, userName) {
  if (!_mentionCtx) return;
  const { el, ddId, atPos, queryLen } = _mentionCtx;
  const text = el.value;
  // Replace @query with @UserName 
  const before = text.substring(0, atPos);
  const after = text.substring(atPos + 1 + queryLen);
  const mentionText = '@' + userName.replace(/\s+/g, '_') + ' ';
  el.value = before + mentionText + after;
  const newPos = (before + mentionText).length;
  el.focus();
  el.setSelectionRange(newPos, newPos);
  document.getElementById(ddId).classList.remove('active');
  _mentionCtx = null;
}

// Parse mentions from text and return user IDs
function parseMentions(text) {
  if (!text) return [];
  const mentioned = [];
  state.allUsers.forEach(u => {
    if (u.id === state.profile.id) return;
    const tag = '@' + u.full_name.replace(/\s+/g, '_');
    if (text.includes(tag)) mentioned.push(u);
  });
  return mentioned;
}

// Notify mentioned users
async function notifyMentions(text, patient, kind, context) {
  const mentioned = parseMentions(text);
  if (mentioned.length === 0) return;
  const myPrefix = state.profile.role === 'admin' ? '👑' : state.profile.role === 'specialist' ? '⭐' : '👨‍⚕️';
  const records = mentioned.map(u => ({
    user_id: u.id,
    patient_id: patient.id,
    type: kind === 'order' ? 'mention_order' : 'mention_note',
    title: `⭐ You were mentioned`,
    body: `${myPrefix} ${state.profile.full_name} mentioned you in ${kind === 'order' ? 'order: ' + context : 'a ' + (context || 'note')} for ${patient.name}`,
    is_read: false
  }));
  await sb.from('notifications').insert(records);
}

// Close mention dropdown on click outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.mention-wrapper')) {
    document.querySelectorAll('.mention-dropdown.active').forEach(d => d.classList.remove('active'));
  }
});

// ============== PDF EXPORT ==============
async function exportPDF() {
  const p = getCurrentPatient();
  if (!p) { alert('No patient selected'); return; }
  
  // Show loading
  const btn = event.target;
  const origText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 12;
    let y = margin;
    
    // Helper functions
    const addHeader = () => {
      doc.setFillColor(43, 108, 176);
      doc.rect(0, 0, pageW, 18, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.text('ICU Patient Record', margin, 11);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(new Date().toLocaleString(), pageW - margin, 11, { align: 'right' });
      doc.setTextColor(0, 0, 0);
      y = 25;
    };
    
    const addFooter = (pageNum, totalPages, footerImg) => {
      if (footerImg) {
        // Use pre-rendered image for Arabic names
        const imgW = pageW - 2*margin;
        const imgH = (footerImg.h / footerImg.w) * imgW;
        doc.addImage(footerImg.data, 'PNG', margin, pageH - imgH - 4, imgW, imgH);
        // Page number on top (text - safe)
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text(`Page ${pageNum} of ${totalPages}`, pageW - margin, pageH - imgH - 5, { align: 'right' });
        doc.setTextColor(0, 0, 0);
      } else {
        // Standard text footer (English)
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text(`Patient: ${p.name} | Specialist: ${p.specialist_name || '-'}`, margin, pageH - 8);
        doc.text(`Page ${pageNum} of ${totalPages}`, pageW - margin, pageH - 8, { align: 'right' });
        doc.text(`Generated by: ${state.profile.full_name}`, pageW/2, pageH - 8, { align: 'center' });
        doc.setTextColor(0, 0, 0);
      }
    };
    
    const checkSpace = (needed) => {
      if (y + needed > pageH - 15) {
        doc.addPage();
        addHeader();
      }
    };
    
    const addSectionTitle = (title) => {
      checkSpace(12);
      doc.setFillColor(235, 248, 255);
      doc.rect(margin, y, pageW - 2*margin, 7, 'F');
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(43, 108, 176);
      doc.text(title, margin + 2, y + 5);
      doc.setTextColor(0, 0, 0);
      y += 9;
    };
    
    const addKV = (key, val) => {
      checkSpace(5);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text(key + ':', margin, y);
      doc.setFont('helvetica', 'normal');
      const txt = String(val || '-');
      const lines = doc.splitTextToSize(txt, pageW - 2*margin - 35);
      doc.text(lines, margin + 35, y);
      y += Math.max(5, lines.length * 4.5);
    };
    
    const addText = (text, opts = {}) => {
      if (!text) return;
      const sz = opts.size || 9;
      doc.setFontSize(sz);
      doc.setFont('helvetica', opts.bold ? 'bold' : 'normal');
      const lines = doc.splitTextToSize(String(text), pageW - 2*margin);
      checkSpace(lines.length * (sz/2.5));
      doc.text(lines, margin, y);
      y += lines.length * (sz/2.5) + 1;
    };
    
    // ===== PAGE 1: HEADER & DEMOGRAPHICS =====
    addHeader();
    
    // Helper: detect Arabic text
    const hasArabic = (s) => /[\u0600-\u06FF]/.test(String(s || ''));
    
    // Patient banner - use html2canvas if Arabic detected
    const losDays = p.admission_date ? Math.floor((Date.now() - new Date(p.admission_date).getTime())/86400000) : 0;
    const bmi = (p.weight && p.height) ? (parseFloat(p.weight)/Math.pow(parseFloat(p.height)/100,2)).toFixed(1) : '-';
    
    const nameHasArabic = hasArabic(p.name);
    const allergiesHaveArabic = (p.allergies || []).some(hasArabic);
    
    if (nameHasArabic || allergiesHaveArabic) {
      // Render banner as image for Arabic support
      const tempDiv = document.createElement('div');
      tempDiv.style.cssText = 'position:absolute;left:-9999px;top:0;width:760px;background:#f7fafc;padding:14px 18px;border-left:4px solid #2b6cb0;font-family:Arial,sans-serif;direction:ltr;';
      tempDiv.innerHTML = `
        <div style="font-size:22px;font-weight:bold;color:#1a202c;unicode-bidi:plaintext;text-align:left;margin-bottom:6px;">${escapeHtml(p.name || '-')}</div>
        <div style="font-size:13px;color:#2d3748;margin-bottom:4px;">Specialist: ${escapeHtml(p.specialist_name || '-')}  |  Age: ${p.age}y  |  Sex: ${escapeHtml(p.sex || '-')}  |  Bed: ${escapeHtml(p.bed || '-')}</div>
        <div style="font-size:13px;color:#2d3748;margin-bottom:4px;">Weight: ${p.weight || '-'}kg  |  Height: ${p.height || '-'}cm  |  BMI: ${bmi}  |  LOS: ${losDays}d</div>
        <div style="display:flex;gap:18px;font-size:13px;font-weight:bold;">
          <span style="color:#742a2a;">Code: ${escapeHtml(p.code_status || 'Full Code')}</span>
          <span style="color:${p.allergies && p.allergies.length ? '#c53030' : '#22543d'};unicode-bidi:plaintext;">${p.allergies && p.allergies.length ? '⚠ Allergies: ' + p.allergies.map(escapeHtml).join(', ') : 'NKDA'}</span>
        </div>
      `;
      document.body.appendChild(tempDiv);
      try {
        const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#f7fafc' });
        const imgData = canvas.toDataURL('image/png');
        const imgWidth = pageW - 2*margin;
        const imgHeight = (canvas.height / canvas.width) * imgWidth;
        doc.addImage(imgData, 'PNG', margin, y, imgWidth, imgHeight);
        y += imgHeight + 4;
      } catch(e) {
        console.warn('Banner image render failed, fallback to text:', e);
        // Fallback: text only
        doc.setFillColor(247, 250, 252);
        doc.rect(margin, y, pageW - 2*margin, 26, 'F');
        doc.setFontSize(15);
        doc.setFont('helvetica', 'bold');
        doc.text(p.name || '-', margin + 3, y + 7);
        y += 30;
      } finally {
        document.body.removeChild(tempDiv);
      }
    } else {
      // Standard text banner (English)
      doc.setFillColor(247, 250, 252);
      doc.rect(margin, y, pageW - 2*margin, 26, 'F');
      doc.setDrawColor(43, 108, 176);
      doc.setLineWidth(0.8);
      doc.line(margin, y, margin, y + 26);
      doc.setFontSize(15);
      doc.setFont('helvetica', 'bold');
      doc.text(p.name || '-', margin + 3, y + 7);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(`Specialist: ${p.specialist_name || '-'}  |  Age: ${p.age}y  |  Sex: ${p.sex || '-'}  |  Bed: ${p.bed || '-'}`, margin + 3, y + 13);
      doc.text(`Weight: ${p.weight || '-'}kg  |  Height: ${p.height || '-'}cm  |  BMI: ${bmi}  |  LOS: ${losDays}d`, margin + 3, y + 18);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(120, 50, 50);
      doc.text(`Code: ${p.code_status || 'Full Code'}`, margin + 3, y + 23);
      if (p.allergies && p.allergies.length) {
        doc.setTextColor(197, 48, 48);
        doc.text(`⚠ Allergies: ${p.allergies.join(', ')}`, margin + 50, y + 23);
      } else {
        doc.setTextColor(34, 84, 61);
        doc.text(`NKDA`, margin + 50, y + 23);
      }
      doc.setTextColor(0, 0, 0);
      y += 30;
    }
    
    addSectionTitle('ADMISSION INFORMATION');
    addKV('Admission Date', p.admission_date ? new Date(p.admission_date).toLocaleString() : '-');
    addKV('Diagnosis', p.admission_diagnosis);
    if (p.ec_name) {
      addKV('Emergency Contact', `${p.ec_name} (${p.ec_rel || '-'}) - ${p.ec_phone || '-'}`);
    }
    y += 2;
    
    // ===== ADMISSION NOTE =====
    const adm = p.admission_note || {};
    if (adm.hpi || adm.pmh || adm.psh || adm.drugHx || adm.familyHx || adm.socialHx || adm.plan) {
      addSectionTitle('ADMISSION NOTE');
      if (adm.hpi) { addText('HPI:', { bold: true }); addText(adm.hpi); y += 1; }
      if (adm.pmh) { addText('Past Medical History:', { bold: true }); addText(adm.pmh); y += 1; }
      if (adm.psh) { addText('Past Surgical History:', { bold: true }); addText(adm.psh); y += 1; }
      if (adm.drugHx) { addText('Drug History:', { bold: true }); addText(adm.drugHx); y += 1; }
      if (adm.familyHx) { addText('Family History:', { bold: true }); addText(adm.familyHx); y += 1; }
      if (adm.socialHx) { addText('Social History:', { bold: true }); addText(adm.socialHx); y += 1; }
      if (adm.rosExam) { addText('ROS / Physical Exam:', { bold: true }); addText(adm.rosExam); y += 1; }
      if (adm.plan) { addText('Plan:', { bold: true }); addText(adm.plan); y += 2; }
    }
    
    // ===== ICU SCORES =====

        columnStyles: {
          0: { cellWidth: 30 },
          1: { cellWidth: 12 },
          2: { cellWidth: 22 },
          3: { cellWidth: 14 },
          4: { cellWidth: 12 },
          5: { cellWidth: 15 },
          6: { cellWidth: 18 },
          7: { cellWidth: 12 },
          8: { cellWidth: 18 }
        }

              else if (v > f.high) status = ' ↑';

      });
      const ioRows = Object.keys(byDay).sort().reverse().slice(0,7).map(day => {
        const d = byDay[day];
        const bal = d.in - d.out;
        return [day, d.in.toFixed(0)+' mL', d.out.toFixed(0)+' mL', (bal>=0?'+':'')+bal.toFixed(0)+' mL'];
      });
      doc.autoTable({

        body: ioRows, margin: { left: margin, right: margin },
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [43, 108, 176], textColor: 255 }
      });
      y = doc.lastAutoTable.finalY + 4;
    }
    
    // ===== LINES & DEVICES =====
    if (linesR.data && linesR.data.length) {
      addSectionTitle('LINES & DEVICES (Active)');
      doc.autoTable({
        startY: y,
        head: [['Type','Site','Inserted','Days','Size']],
        body: linesR.data.map(l => {

        doc.setFont('helvetica', 'bold');

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        if (c.organism) { doc.text(`Organism: ${c.organism}`, margin+3, y); y += 4; }
        if (c.gram_stain) { doc.text(`Gram Stain: ${c.gram_stain}`, margin+3, y); y += 4; }
        if (c.sensitivity) {
          doc.text('Sensitivity:', margin+3, y); y += 4;
          const lines = doc.splitTextToSize(c.sensitivity, pageW - 2*margin - 5);
          doc.text(lines, margin+5, y);
          y += lines.length * 4 + 2;
        }
      });
    }
    
    // ===== IMAGING SUMMARY =====
    if (imgR.data && imgR.data.length) {
      addSectionTitle('IMAGING REPORTS');
      doc.autoTable({
        startY: y,
        head: [['Type','Date','Findings/Label']],
        body: imgR.data.map(i => [
          i.category.toUpperCase(),
          new Date(i.time).toLocaleString([], {month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'}),
          i.label || '-'
        ]),
        margin: { left: margin, right: margin },
        styles: { fontSize: 8, cellPadding: 1.5 },
        headStyles: { fillColor: [43, 108, 176], textColor: 255 }
      });
      y = doc.lastAutoTable.finalY + 4;
    }
    
    // ===== DAILY NOTES =====
    if (notesR.data && notesR.data.length) {
      addSectionTitle('DAILY NOTES (Last 15)');
      for (const n of notesR.data) {
        const noteHasArabic = hasArabic(n.body) || hasArabic(n.author_name);
        
        if (noteHasArabic) {
          // Render note as image
          const tempDiv = document.createElement('div');
          tempDiv.style.cssText = 'position:absolute;left:-9999px;top:0;width:760px;padding:8px 10px;font-family:Arial,sans-serif;background:#ffffff;border-bottom:1px solid #e2e8f0;';
          const roleIcon = n.author_role === 'specialist' ? '⭐' : n.author_role === 'admin' ? '👑' : '';
          tempDiv.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <strong style="font-size:13px;color:#2b6cb0;unicode-bidi:plaintext;">${roleIcon} ${escapeHtml(n.author_name)} (${escapeHtml(n.author_role)})</strong>
              <span style="font-size:10px;color:#718096;">${new Date(n.created_at).toLocaleString()}</span>
            </div>
            ${n.section ? `<div style="font-size:11px;color:#2b6cb0;font-style:italic;margin-bottom:3px;">${escapeHtml(n.section)}</div>` : ''}
            <div style="font-size:12px;color:#1a202c;white-space:pre-wrap;unicode-bidi:plaintext;text-align:start;line-height:1.5;">${escapeHtml(n.body)}</div>
          `;
          document.body.appendChild(tempDiv);
          try {
            const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff' });
            const imgData = canvas.toDataURL('image/png');
            const imgWidth = pageW - 2*margin;
            const imgHeight = (canvas.height / canvas.width) * imgWidth;
            checkSpace(imgHeight + 2);
            doc.addImage(imgData, 'PNG', margin, y, imgWidth, imgHeight);
            y += imgHeight + 3;
          } catch(e) {
            console.warn('Note image failed:', e);
          } finally {
            document.body.removeChild(tempDiv);
          }
        } else {
          // Plain English note - faster rendering
          checkSpace(25);
          const roleIcon = n.author_role === 'specialist' ? '⭐' : n.author_role === 'admin' ? '👑' : '';
          doc.setFontSize(9);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(43, 108, 176);
          doc.text(`${roleIcon} ${n.author_name} (${n.author_role})`, margin, y);
          doc.setTextColor(120, 120, 120);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.text(new Date(n.created_at).toLocaleString(), pageW - margin, y, { align: 'right' });
          y += 4;
          if (n.section) {
            doc.setFontSize(8);
            doc.setFont('helvetica', 'italic');
            doc.setTextColor(43, 108, 176);
            doc.text(n.section, margin, y);
            y += 4;
          }
          doc.setTextColor(0, 0, 0);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8);
          const lines = doc.splitTextToSize(n.body, pageW - 2*margin);
          checkSpace(lines.length * 3.5 + 5);
          doc.text(lines, margin, y);
          y += lines.length * 3.5 + 4;
        }
        // Separator
        doc.setDrawColor(220, 220, 220);
        doc.line(margin, y, pageW - margin, y);
        y += 3;
      }
    }
    
    // Add footers to all pages
    const totalPages = doc.internal.getNumberOfPages();
    
    // If patient name or doctor name has Arabic, pre-render footer as image
    let footerImg = null;
    if (hasArabic(p.name) || hasArabic(state.profile.full_name)) {
      const footerDiv = document.createElement('div');
      footerDiv.style.cssText = 'position:absolute;left:-9999px;top:0;width:760px;padding:4px 0;font-family:Arial,sans-serif;background:#ffffff;display:flex;justify-content:space-between;font-size:11px;color:#999;border-top:1px solid #ddd;';
      footerDiv.innerHTML = `
        <span style="unicode-bidi:plaintext;">Patient: ${escapeHtml(p.name || '-')} | Specialist: ${escapeHtml(p.specialist_name || '-')}</span>
        <span style="unicode-bidi:plaintext;">Generated by: ${escapeHtml(state.profile.full_name)}</span>
      `;
      document.body.appendChild(footerDiv);
      try {
        const canvas = await html2canvas(footerDiv, { scale: 2, backgroundColor: '#ffffff' });
        footerImg = { 
          data: canvas.toDataURL('image/png'),
          w: canvas.width,
          h: canvas.height
        };
      } catch(e) {
        console.warn('Footer image render failed:', e);
      } finally {
        document.body.removeChild(footerDiv);
      }
    }
    
    for (let i = 1; i <= totalPages; i++) {
      doc.setPage(i);
      addFooter(i, totalPages, footerImg);
    }
    
    // Save
    const safeName = (p.name || 'patient').replace(/[^a-zA-Z0-9\u0600-\u06FF]/g, '_').substring(0, 40);
    const dateStr = new Date().toISOString().slice(0,10);
    doc.save(`ICU_${safeName}_${dateStr}.pdf`);
    
  } catch(e) {
    console.error('PDF Error:', e);
    alert('Failed to generate PDF: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = origText;
  }
}

// ============== CASE DISCUSSION ==============
// Same pattern as renderRounds/loadRoundsData: return the shell synchronously,
// then fill in the list asynchronously once data arrives.
function renderCaseDiscussion(p) {
  loadCaseDiscussionArea(p.id);
  return `
    <div class="section">
      <div class="section-title">
        💬 Case Discussion
        <button class="btn-primary btn-small" onclick="openNewDiscussionModal()">+ New Discussion</button>
      </div>
      <div id="discussion-area"><div class="spinner"></div> Loading...</div>
    </div>
  `;
}

async function loadCaseDiscussionArea(patientId) {
  state.discussionView = 'list';
  const { data, error } = await sb.from('case_discussions').select('*').eq('patient_id', patientId).order('created_at', { ascending: false });
  const el = document.getElementById('discussion-area');
  if (!el) return;
  if (error) { el.innerHTML = `<div class="alert error">Could not load discussions: ${escapeHtml(error.message)}</div>`; return; }
  state.discussionList = data || [];
  if (state.discussionList.length) {
    const ids = state.discussionList.map(d => d.id);
    const { data: counts } = await sb.from('case_discussion_replies').select('discussion_id').in('discussion_id', ids);
    const map = {};
    (counts || []).forEach(r => { map[r.discussion_id] = (map[r.discussion_id] || 0) + 1; });
    state.discussionList.forEach(d => d._replyCount = map[d.id] || 0);
  }
  el.innerHTML = renderDiscList();
}

function renderDiscList() {
  if (!state.discussionList || !state.discussionList.length) {
    return '<div style="color:#a0aec0;text-align:center;padding:20px;">No case discussions yet for this patient.</div>';
  }
  return state.discussionList.map(d => `
    <div class="disc-card ${d.status==='resolved'?'resolved':''}" onclick="openDiscussionDetail('${d.id}')">
      <div class="disc-title">${escapeHtml(d.title)}</div>
      <div class="disc-summary">${escapeHtml(d.summary)}</div>
      <div class="disc-meta">
        <span class="status-pill ${d.status}">${d.status}</span>
        <span class="disc-role-tag ${d.author_role}">${d.author_role==='specialist'?'⭐':d.author_role==='admin'?'👑':'👨‍⚕️'} ${escapeHtml(d.author_name)}</span>
        <span>💬 ${d._replyCount || 0}</span>
        <span>${formatDateTime(d.created_at)}</span>
      </div>
    </div>
  `).join('');
}

function openNewDiscussionModal() {
  state._pendingDiscImage = null;
  showModal(`
    <div class="modal-title">🆕 New Case Discussion</div>
    <div class="form-group"><label>Title *</label><input id="nd-title" placeholder="e.g. Refractory hypotension - management?"></div>
    <div class="form-group">
      <label>Clinical summary / question * <span style="color:#a0aec0;font-weight:normal;font-size:11px;">— Type @ to mention a doctor</span></label>
      <div class="mention-wrapper">
        <textarea id="nd-summary" style="min-height:120px;" oninput="handleMentionInput(this,'nd-dd')" placeholder="Brief history, current status, and the specific question for discussion..."></textarea>
        <div id="nd-dd" class="mention-dropdown"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Attach image (X-ray, ECG, labs...)</label>
      <input type="file" id="nd-image" accept="image/*" onchange="previewNewDiscImage(this)">
      <img id="nd-img-preview" style="display:none;max-width:100%;max-height:200px;margin-top:8px;border-radius:4px;border:1px solid #e2e8f0;">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="btn-nd-save" onclick="saveNewDiscussion()">Post</button>
    </div>
  `);
}

function previewNewDiscImage(input) {
  const file = input.files[0];
  if (!file) return;
  state._pendingDiscImage = file;
  const img = document.getElementById('nd-img-preview');
  img.src = URL.createObjectURL(file);
  img.style.display = 'block';
}

async function saveNewDiscussion() {
  const p = getCurrentPatient();
  const title = document.getElementById('nd-title').value.trim();
  const summary = document.getElementById('nd-summary').value.trim();
  if (!title || !summary) { alert('Please fill in title and summary'); return; }
  const btn = document.getElementById('btn-nd-save');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Posting...';
  try {
    let image_url = null;
    if (state._pendingDiscImage) image_url = await uploadFile(state._pendingDiscImage, 'case-discussion');
    const { data, error } = await sb.from('case_discussions').insert({
      patient_id: p.id, title, summary, image_url, status: 'open',
      created_by: state.profile.id, author_name: state.profile.full_name,
      author_role: state.profile.role, specialty: state.profile.specialty
    }).select().single();
    if (error) throw error;
    await notifyTeam(p.id, 'case_discussion', '💬 New Case Discussion', `${state.profile.full_name} started a discussion on ${p.name}: ${title}`);
    await notifyMentions(summary, p, 'note', 'case discussion: ' + title);
    closeModal();
    openDiscussionDetail(data.id);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Post';
  }
}

async function openDiscussionDetail(id) {
  const el = document.getElementById('discussion-area');
  if (el) el.innerHTML = '<div class="spinner"></div> Loading...';
  const { data: disc, error } = await sb.from('case_discussions').select('*').eq('id', id).single();
  if (error || !disc) { alert('Could not load discussion'); return; }
  state.discussionView = id;
  state.currentDiscussionData = disc;
  const { data: replies } = await sb.from('case_discussion_replies').select('*').eq('discussion_id', id).order('created_at', { ascending: true });
  state.currentDiscussionReplies = replies || [];
  renderDiscussionDetailView();
}

function renderDiscussionDetailView() {
  const d = state.currentDiscussionData;
  const canManage = d.created_by === state.profile.id || state.profile.role === 'admin';
  const el = document.getElementById('discussion-area');
  if (!el) return;
  el.innerHTML = `
    <div class="disc-back-link" onclick="backToDiscussionList()">← Back to all discussions</div>
    <div class="disc-detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
        <div class="disc-detail-title">${escapeHtml(d.title)}</div>
        <span class="status-pill ${d.status}">${d.status}</span>
      </div>
      <div class="disc-meta" style="margin-bottom:6px;">
        <span class="disc-role-tag ${d.author_role}">${d.author_role==='specialist'?'⭐':d.author_role==='admin'?'👑':'👨‍⚕️'} ${escapeHtml(d.author_name)} ${d.specialty?'· '+escapeHtml(d.specialty):''}</span>
        <span>${formatDateTime(d.created_at)}</span>
      </div>
      <div class="disc-detail-body">${formatMentions(escapeHtml(d.summary))}</div>
      ${d.image_url ? `<img src="${d.image_url}" class="disc-img" onclick="viewImage('${d.image_url}')">` : ''}
      ${canManage ? `
        <div style="margin-top:10px;display:flex;gap:8px;">
          ${d.status === 'open'
            ? `<button class="btn-success" onclick="setDiscussionStatus('resolved')">✓ Mark Resolved</button>`
            : `<button class="btn-secondary btn-small" onclick="setDiscussionStatus('open')">↺ Reopen</button>`}
          <button class="btn-danger" onclick="deleteDiscussion()">Delete</button>
        </div>` : ''}
    </div>
    <div style="font-size:13px;font-weight:700;color:#2b6cb0;margin-bottom:8px;text-transform:uppercase;">💬 Replies (${state.currentDiscussionReplies.length})</div>
    <div id="reply-root-form"></div>
    <div class="reply-tree" id="reply-tree">${renderReplyTree(null)}</div>
  `;
  document.getElementById('reply-root-form').innerHTML = renderReplyForm('root', null);
}

function backToDiscussionList() {
  const p = getCurrentPatient();
  loadCaseDiscussionArea(p.id);
}

async function setDiscussionStatus(status) {
  const { error } = await sb.from('case_discussions').update({ status, updated_at: new Date().toISOString() }).eq('id', state.currentDiscussionData.id);
  if (error) { alert(error.message); return; }
  state.currentDiscussionData.status = status;
  renderDiscussionDetailView();
}

async function deleteDiscussion() {
  if (!confirm('Delete this entire discussion and all its replies? This cannot be undone.')) return;
  const { error } = await sb.from('case_discussions').delete().eq('id', state.currentDiscussionData.id);
  if (error) { alert(error.message); return; }
  backToDiscussionList();
}

function renderReplyTree(parentId) {
  const children = state.currentDiscussionReplies.filter(r => (r.parent_id || null) === parentId);
  if (!children.length) return '';
  return children.map(r => renderReplyNode(r)).join('');
}

function renderReplyNode(r) {
  const canManage = r.author_id === state.profile.id || state.profile.role === 'admin';
  const childrenHtml = renderReplyTree(r.id);
  return `
    <div class="reply-item" id="reply-${r.id}">
      <div class="reply-meta">
        <span class="disc-role-tag ${r.author_role}">${r.author_role==='specialist'?'⭐':r.author_role==='admin'?'👑':'👨‍⚕️'} ${escapeHtml(r.author_name)} ${r.specialty?'· '+escapeHtml(r.specialty):''}</span>
        <span>${formatDateTime(r.created_at)}</span>
      </div>
      <div class="reply-body">${formatMentions(escapeHtml(r.body))}</div>
      ${r.image_url ? `<img src="${r.image_url}" class="reply-img" onclick="viewImage('${r.image_url}')">` : ''}
      <div class="reply-actions">
        <a onclick="toggleReplyForm('${r.id}')">↩ Reply</a>
        ${canManage ? `<a class="danger" onclick="deleteReply('${r.id}')">Delete</a>` : ''}
      </div>
      <div id="reply-form-${r.id}"></div>
      ${childrenHtml ? `<div class="reply-children">${childrenHtml}</div>` : ''}
    </div>
  `;
}

function renderReplyForm(key, parentId) {
  return `
    <div class="reply-form" id="rf-${key}">
      <div class="mention-wrapper">
        <textarea id="rf-body-${key}" placeholder="Write a reply... use @ to mention" oninput="handleMentionInput(this,'rf-dd-${key}')"></textarea>
        <div id="rf-dd-${key}" class="mention-dropdown"></div>
      </div>
      <input type="file" id="rf-img-${key}" accept="image/*" style="margin-top:6px;font-size:12px;">
      <div class="reply-form-actions">
        ${parentId ? `<button class="btn-secondary btn-small" onclick="hideReplyForm('${key}')">Cancel</button>` : ''}
        <button class="btn-primary btn-small" onclick="submitReply('${key}', ${parentId ? `'${parentId}'` : 'null'})">Send</button>
      </div>
    </div>
  `;
}

function toggleReplyForm(replyId) {
  const el = document.getElementById('reply-form-' + replyId);
  if (!el) return;
  el.innerHTML = el.innerHTML ? '' : renderReplyForm(replyId, replyId);
}

function hideReplyForm(key) {
  const container = document.getElementById('reply-form-' + key);
  if (container) container.innerHTML = '';
}

async function submitReply(key, parentId) {
  const p = getCurrentPatient();
  const bodyEl = document.getElementById('rf-body-' + key);
  const body = bodyEl.value.trim();
  const fileInput = document.getElementById('rf-img-' + key);
  const file = fileInput && fileInput.files[0];
  if (!body && !file) { alert('Write something or attach an image'); return; }
  try {
    let image_url = null;
    if (file) image_url = await uploadFile(file, 'case-discussion');
    const { data, error } = await sb.from('case_discussion_replies').insert({
      discussion_id: state.currentDiscussionData.id,
      parent_id: parentId,
      body: body || '(image)',
      image_url,
      author_id: state.profile.id,
      author_name: state.profile.full_name,
      author_role: state.profile.role,
      specialty: state.profile.specialty
    }).select().single();
    if (error) throw error;
    state.currentDiscussionReplies.push(data);
    await notifyMentions(body, p, 'note', 'case discussion: ' + state.currentDiscussionData.title);
    renderDiscussionDetailView();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteReply(id) {
  if (!confirm('Delete this reply? Its own replies will be deleted too.')) return;
  const { error } = await sb.from('case_discussion_replies').delete().eq('id', id);
  if (error) { alert(error.message); return; }
  const { data: replies } = await sb.from('case_discussion_replies').select('*').eq('discussion_id', state.currentDiscussionData.id).order('created_at', { ascending: true });
  state.currentDiscussionReplies = replies || [];
  renderDiscussionDetailView();
}

// ============== UTILITIES ==============
function showModal(html) { document.getElementById('modal-content').innerHTML = html; document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function viewImage(src, type='image') {
  const c = document.getElementById('image-viewer-content');
  c.innerHTML = type==='video'?`<video src="${src}" controls autoplay></video>`:`<img src="${src}">`;
  document.getElementById('image-viewer').classList.add('active');
}
function closeImageViewer() { document.getElementById('image-viewer').classList.remove('active'); }

function escapeHtml(t) { if (t==null) return ''; return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatDateTime(t) { if(!t) return '-'; const d=new Date(t); if(isNaN(d))return t; return d.toLocaleString([],{year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function formatDate(t) { if(!t) return '-'; const d=new Date(t); if(isNaN(d))return t; return d.toLocaleDateString(); }
function formatTime(t) { if(!t) return '-'; const d=new Date(t); if(isNaN(d))return t; return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

// ============== AUTO-GROW TEXTAREAS ==============
// Every textarea across the app grows to fit its content instead of showing
// an inner scrollbar / cutting text off. Uses a MutationObserver so it works
// automatically on any textarea added later (modals, tab switches, etc.)
// without needing to edit every render function individually.
function autoGrowTextarea(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight + 2) + 'px';
}

function setupAutoGrowTextareas() {
  const bindAll = (root) => {
    root.querySelectorAll ? root.querySelectorAll('textarea').forEach(el => {
      if (el.dataset.autogrowBound) return;
      el.dataset.autogrowBound = '1';
      autoGrowTextarea(el);
      el.addEventListener('input', () => autoGrowTextarea(el));
    }) : null;
  };
  bindAll(document);
  const appEl = document.getElementById('app');
  if (!appEl) return;
  const observer = new MutationObserver((mutations) => {
    mutations.forEach(m => {
      m.addedNodes.forEach(node => {
        if (node.nodeType !== 1) return; // element nodes only
        if (node.tagName === 'TEXTAREA') bindAll({ querySelectorAll: (sel) => [node] });
        else if (node.querySelectorAll) bindAll(node);
      });
    });
  });
  observer.observe(appEl, { childList: true, subtree: true });
}
setupAutoGrowTextareas();

// ============== START ==============
init();
</script>
